name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve contact form endpoint
        shell: bash
        env:
          FORMSPREE_ENDPOINT_VAR: ${{ vars.PUBLIC_FORMSPREE_ENDPOINT }}
          FORMSPREE_ENDPOINT_SECRET: ${{ secrets.PUBLIC_FORMSPREE_ENDPOINT }}
        run: |
          endpoint="${FORMSPREE_ENDPOINT_VAR:-$FORMSPREE_ENDPOINT_SECRET}"
          if [ -z "$endpoint" ]; then
            echo "PUBLIC_FORMSPREE_ENDPOINT is not configured as a repository variable or secret."
            exit 1
          fi
          echo "PUBLIC_FORMSPREE_ENDPOINT=$endpoint" >> "$GITHUB_ENV"

      - name: Install, build, and upload site
        uses: withastro/action@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4